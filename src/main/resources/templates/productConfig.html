<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>产品配置管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 40px;
            margin-top: 70px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 40px;
        }
        .title {
            font-size: 24px;
            margin-bottom: 24px;
            border-left: 4px solid #2563eb;
            padding-left: 12px;
            color: #222;
        }
        .tool-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            color: white;
            cursor: pointer;
        }
        .btn-add { background: #2563eb; }
        .btn-edit { background: #f59e0b; padding: 4px 10px;font-size:12px; }
        .btn-del { background: #ef4444; padding: 4px 10px;font-size:12px; }
        .btn-view { background: #10b981; padding: 4px 10px;font-size:12px; }
        table { width:100%; border-collapse: collapse; }
        th { background:#f9fafb; padding:12px; text-align:left; }
        td { padding:12px; border-top:1px solid #eee; }
        tr:hover { background:#f3f4f6; }
        .pagination { margin-top:20px; display:flex; gap:10px; align-items: center; }
        .page-btn { padding:6px 12px; border:1px solid #ddd; border-radius:4px; cursor:pointer; }
        .page-btn.active { background:#2563eb; color:#fff; }

        .mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            display: none;
        }
        .dialog {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            width: 700px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .form-item {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            position: relative;
        }
        .form-item label {
            width: 140px;
            text-align: right;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .form-item input, .form-item textarea {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .form-item textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-btns {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn-cancel { background:#9ca3af; }

        #productForm, #editForm {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 22px;
        }
        .form-full {
            grid-column: 1 / -1;
        }

        /* 重复校验错误提示样式（和其他模块统一） */
        .error-tip {
            position: absolute;
            left: 150px;
            top: 44px;
            color: #f53f3f;
            font-size: 12px;
            display: none;
        }

        /* ========== 全站统一导航样式 ========== */
        .navbar {
            background: #fff;
            height: 70px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            padding: 0 40px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 999;
        }
        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #2563eb;
            margin-right: 50px;
        }
        .nav-tabs {
            display: flex;
            gap: 10px;
        }
        .menu-wrap {
            position: relative;
        }
        .nav-item {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #444;
            white-space: nowrap;
        }
        .nav-item:hover {
            background: #eff6ff;
            color: #2563eb;
            transform: translateY(-2px);
        }
        .nav-item.active {
            background: #2563eb;
            color: #fff;
            box-shadow: 0 4px 12px rgba(37,99,235,0.3);
        }
        /* 二级下拉菜单 */
        .sub-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            min-width: 180px;
            padding: 8px 0;
            display: none;
            z-index: 1000;
        }
        .sub-item {
            padding: 10px 24px;
            font-size: 14px;
            color: #444;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sub-item:hover {
            background: #eff6ff;
            color: #2563eb;
        }
        .menu-wrap:hover .sub-menu {
            display: block;
        }
    </style>
</head>
<body>

<!-- 全站统一导航结构 -->
<div class="navbar">
    <div class="logo">业务管理系统</div>
    <div class="nav-tabs">
        <div class="menu-wrap">
            <div class="nav-item" data-page="index">首页</div>
        </div>
        <div class="menu-wrap">
            <div class="nav-item">业务操作</div>
            <div class="sub-menu">
                <div class="sub-item" data-page="order">销售订单管理</div>
                <div class="sub-item" data-page="activity">活动页面</div>
            </div>
        </div>
        <!-- 当前页面所属：配置管理（一级菜单高亮） -->
        <div class="menu-wrap">
            <div class="nav-item active">配置管理</div>
            <div class="sub-menu">
                <div class="sub-item" data-page="dealer">经销商配置管理</div>
                <div class="sub-item" data-page="activityConfig">活动配置管理</div>
                <div class="sub-item" data-page="productConfig">产品配置管理</div>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <h2 class="title">产品配置管理</h2>
    <div class="tool-bar">
        <button class="btn btn-add" id="openAdd">+ 新增产品</button>
        <div>
            每页显示：
            <select id="pageSizeSelect" class="page-size">
                <option value="10">10</option>
                <option value="30">30</option>
                <option value="50">50</option>
            </select> 条
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>序号</th>
            <th>产品名称</th>
            <th>产品单价</th>
            <th>备注</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>

    <div class="pagination">
        <span>总条数：<span id="total">0</span></span>
        <button class="page-btn" id="first">首页</button>
        <button class="page-btn" id="prev">上一页</button>
        <span id="pageInfo">第 1 页</span>
        <button class="page-btn" id="next">下一页</button>
        <button class="page-btn" id="last">尾页</button>
    </div>
</div>

<!-- 新增弹窗 -->
<div class="mask" id="addModal">
    <div class="dialog">
        <h3>新增产品</h3>
        <form id="productForm">
            <div class="form-item">
                <label>产品名称</label>
                <input type="text" name="productName" id="add_productName" placeholder="请输入产品名称" required>
                <div class="error-tip" id="add_name_tip">该产品名称已存在</div>
            </div>

            <div class="form-item">
                <label>产品单价</label>
                <input type="number" step="0.01" name="price" placeholder="请输入产品单价" required>
            </div>

            <div class="form-item form-full">
                <label>备注</label>
                <textarea name="comment" placeholder="请输入备注"></textarea>
            </div>

            <div class="form-btns">
                <button type="button" class="btn btn-cancel">取消</button>
                <button type="submit" class="btn btn-add">保存</button>
            </div>
        </form>
    </div>
</div>

<!-- 编辑弹窗 -->
<div class="mask" id="editModal">
    <div class="dialog">
        <h3>编辑产品</h3>
        <form id="editForm">
            <input type="hidden" name="id" id="edit_id">

            <div class="form-item">
                <label>产品名称</label>
                <input type="text" name="productName" id="edit_productName" required>
                <div class="error-tip" id="edit_name_tip">该产品名称已存在</div>
            </div>

            <div class="form-item">
                <label>产品单价</label>
                <input type="number" step="0.01" name="price" id="edit_price" required>
            </div>

            <div class="form-item form-full">
                <label>备注</label>
                <textarea name="comment" id="edit_comment"></textarea>
            </div>

            <div class="form-btns">
                <button type="button" class="btn btn-cancel">取消</button>
                <button type="submit" class="btn btn-add">保存修改</button>
            </div>
        </form>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="mask" id="detailModal">
    <div class="dialog">
        <h3>产品详情</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px 22px;">
            <div class="form-item">
                <label>产品名称</label>
                <input readonly id="detail_productName">
            </div>
            <div class="form-item">
                <label>产品单价</label>
                <input readonly id="detail_price">
            </div>
            <div class="form-item form-full">
                <label>备注</label>
                <textarea readonly id="detail_comment"></textarea>
            </div>
            <div class="form-btns">
                <button class="btn btn-cancel">关闭</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<!-- 原有业务JS不变 -->
<script src="/js/productConfig.js"></script>
<!-- 全站统一公共跳转JS -->
<script src="/js/index.js"></script>
</body>
</html>
