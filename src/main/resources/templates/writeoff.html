<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>核销信息管理</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap/3.3.7/css/bootstrap.min.css">
</head>
<body>
<div class="container" style="margin-top: 30px;">
    <h3>核销信息管理</h3>
    <hr>

    <!-- 新增/编辑表单 -->
    <form th:action="@{/writeoff/save}" method="post" class="form-inline">
        <input type="hidden" name="id" th:value="${writeOff?.id}">
        <div class="form-group">
            <label>经销商名称：</label>
            <select name="dealerId" class="form-control" required>
                <option value="">请选择经销商</option>
                <option th:each="d : ${dealerList}"
                        th:value="${d.id}"
                        th:text="${d.dealerName}"
                        th:selected="${writeOff?.dealerId == d.id}">
                </option>
            </select>
        </div>
        <div class="form-group">
            <label>核销批次号：</label>
            <input type="text" name="batchNo" class="form-control"
                   th:value="${writeOff?.batchNo}" required>
        </div>
        <div class="form-group">
            <label>核销金额：</label>
            <input type="number" step="0.01" name="amount" class="form-control"
                   th:value="${writeOff?.amount}" required>
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
    </form>

    <hr>

    <!-- 搜索栏 -->
    <form th:action="@{/writeoff}" method="get" class="form-inline">
        <input type="text" name="dealerName" class="form-control"
               placeholder="搜索经销商名称" th:value="${dealerName}">
        <button class="btn btn-default">搜索</button>
        <a th:href="@{/writeoff/export(dealerName=${dealerName})}" class="btn btn-success">导出Excel</a>
    </form>

    <hr>

    <!-- 数据列表 -->
    <table class="table table-bordered table-hover">
        <tr class="info">
            <th>ID</th>
            <th>经销商名称</th>
            <th>核销批次号</th>
            <th>核销金额</th>
            <th>操作</th>
        </tr>
        <tr th:each="item : ${page.list}">
            <td th:text="${item.id}"></td>
            <td th:text="${item.dealerName}"></td>
            <td th:text="${item.batchNo}"></td>
            <td th:text="${item.amount}"></td>
            <td>
                <a th:href="@{/writeoff/edit/{id}(id=${item.id})}"
                   class="btn btn-xs btn-warning">编辑</a>
                <a th:href="@{/writeoff/delete/{id}(id=${item.id})}"
                   class="btn btn-xs btn-danger"
                   onclick="return confirm('确定删除？')">删除</a>
            </td>
        </tr>
    </table>

    <!-- 分页 -->
    <nav>
        <ul class="pagination">
            <li th:class="${page.pageNum == 1 ? 'disabled' : ''}">
                <a th:href="@{/writeoff(dealerName=${dealerName},pageNum=${page.pageNum - 1})}">上一页</a>
            </li>
            <li>
                <span>第<span th:text="${page.pageNum}"></span>页
                     / 共<span th:text="${(page.total + 9) / 10}"></span>页</span>
            </li>
            <li th:class="${page.pageNum * 10 >= page.total ? 'disabled' : ''}">
                <a th:href="@{/writeoff(dealerName=${dealerName},pageNum=${page.pageNum + 1})}">下一页</a>
            </li>
        </ul>
    </nav>

    <!-- 页面跳转按钮 -->
    <div style="margin-top:20px">
        <a th:href="@{/dealer}" class="btn btn-info">经销商管理</a>
        <a th:href="@{/order}" class="btn btn-info">销售订单管理</a>
    </div>

</div>
</body>
</html>
